{% extends "admin/base.html" %}
{% block title %}{{ 'Редактировать новость' if news else 'Новая новость' }}{% endblock %}
{% block content %}
<div class="card">
    <h2>{{ 'Редактировать новость' if news else 'Новая новость' }}</h2>
    <form method="POST">
        <input type="text" name="title" placeholder="Заголовок" value="{{ news.title if news else '' }}" required>
        <textarea name="content" placeholder="Текст новости" rows="6" required>{{ news.content if news else '' }}</textarea>
        <input type="date" name="date" value="{{ news.date if news else '' }}" required>
        <select name="project_id">
            <option value="">— Без привязки —</option>
            {% for p in projects %}
                <option value="{{ p.id }}" {% if news and news.project_id == p.id %}selected{% endif %}>{{ p.title }}</option>
            {% endfor %}
        </select>
        <button type="submit">Сохранить</button>
        <a href="{{ url_for('admin.news') }}" style="margin-left: 1rem;">Отмена</a>
    </form>
</div>
{% endblock %}
