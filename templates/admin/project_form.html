{% extends "admin/base.html" %}
{% block title %}{{ 'Редактировать проект' if project else 'Новый проект' }}{% endblock %}
{% block content %}
<div class="card">
    <h2>{{ 'Редактировать проект' if project else 'Новый проект' }}</h2>
    <form method="POST">
        <input type="text" name="title" placeholder="Название" value="{{ project.title if project else '' }}" required>
        <textarea name="description" placeholder="Описание" rows="5" required>{{ project.description if project else '' }}</textarea>
        <button type="submit">Сохранить</button>
        <a href="{{ url_for('admin.projects') }}" style="margin-left: 1rem;">Отмена</a>
    </form>
</div>
{% endblock %}
